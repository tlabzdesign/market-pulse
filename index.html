<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#010409">
<meta name="apple-mobile-web-app-title" content="Market Pulse">
<link rel="manifest" href="/manifest.json">
<title>Market Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#010409;--c:#0d1117;--bd:#21262d;--t:#e6edf3;--d:#8b949e;--m:#484f58;--g:#3fb950;--r:#f85149;--y:#e3b341;--b:#58a6ff;--p:#bc8cff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--t);min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer;touch-action:manipulation;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--b);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
</style>
</head>
<body>
<div id="app">
  <div style="text-align:center;padding:60px 20px">
    <div class="spinner"></div>
    <div style="font-size:12px;color:var(--d);margin-top:12px">Connecting to Market Pulse...</div>
  </div>
</div>

<script>
const API = window.location.origin;
const INR = v => v ? "₹"+Number(v).toLocaleString("en-IN",{maximumFractionDigits:2}) : "—";
const iC = {HIGH:"#f85149",MEDIUM:"#e3b341",LOW:"#6b7280"};
const dC = {POSITIVE:"#3fb950",NEGATIVE:"#f85149",NEUTRAL:"#e3b341"};
const dA = {POSITIVE:"▲",NEGATIVE:"▼",NEUTRAL:"●"};
const sC = {BULLISH:"#3fb950",BEARISH:"#f85149",NEUTRAL:"#e3b341"};

let tab = "news";
let data = {breakouts:[], news:[], outlook:{}, status:{}};
let refreshTimer = null;

// ── Fetch data from backend ──
async function load() {
  try {
    const [sc, nw, ol, st] = await Promise.all([
      fetch(API+"/api/scan").then(r=>r.json()).catch(()=>({breakouts:[]})),
      fetch(API+"/api/news").then(r=>r.json()).catch(()=>({news:[]})),
      fetch(API+"/api/outlook").then(r=>r.json()).catch(()=>({})),
      fetch(API+"/api/status").then(r=>r.json()).catch(()=>({})),
    ]);
    data = {breakouts: sc.breakouts||[], news: nw.news||[], outlook: ol, status: st};
    render();
  } catch(e) {
    document.getElementById("app").innerHTML = `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:36px;margin-bottom:12px">📊</div>
      <div style="font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;margin-bottom:8px">Market Pulse</div>
      <div style="font-size:11px;color:var(--d);line-height:1.8;max-width:300px;margin:0 auto 20px">Cannot reach server.<br>Make sure <code>python server.py</code> is running.</div>
      <button onclick="load()" style="padding:10px 24px;border-radius:8px;background:linear-gradient(135deg,#1f6feb,#8957e5);color:#fff;font-size:12px;font-weight:700;font-family:inherit">↻ Retry</button>
    </div>`;
  }
}

async function forceScan() {
  await fetch(API+"/api/force-scan",{method:"POST"}).catch(()=>{});
  document.getElementById("scanBtn").textContent = "⟳ ...";
  setTimeout(()=>{ load(); document.getElementById("scanBtn").textContent = "⟳ SCAN"; }, 15000);
}

function render() {
  const o = data.outlook || {};
  const bk = data.breakouts || [];
  const nw = data.news || [];
  const st = data.status || {};
  const sc = sC[o.sentiment] || "#e3b341";
  const conf = o.confidence || 50;
  const dash = (conf/100)*207;
  const hi = nw.filter(n=>n.impact==="HIGH").length;
  const po = nw.filter(n=>n.direction==="POSITIVE").length;
  const ne = nw.filter(n=>n.direction==="NEGATIVE").length;
  const lastScan = st.last_scan ? new Date(st.last_scan).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}) : "—";

  let h = `
  <div style="background:var(--c);border-bottom:1px solid var(--bd);padding:10px 14px;padding-top:calc(10px+env(safe-area-inset-top));position:sticky;top:0;z-index:50">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">📊</span>
        <span style="font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;letter-spacing:1px">Market Pulse</span>
        <span style="width:6px;height:6px;border-radius:50%;background:${st.status==='scanning'?'var(--y)':'var(--g)'};animation:bl 1.5s infinite;display:inline-block"></span>
      </div>
      <button id="scanBtn" onclick="forceScan()" style="padding:4px 12px;border-radius:5px;background:linear-gradient(135deg,#1f6feb,#8957e5);color:#fff;font-size:10px;font-weight:800;font-family:inherit">⟳ SCAN</button>
    </div>
    <div style="font-size:8px;color:var(--m);margin-top:3px">Last scan: ${lastScan} • #${st.scan_count||0} • ${bk.length} breakouts • Auto-refresh 60s</div>
  </div>
  <div style="padding:10px 12px;max-width:680px;margin:0 auto">`;

  // ── Outlook ──
  if (o.sentiment) {
    h += `<div style="background:linear-gradient(135deg,var(--c),#161b28,var(--c));border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px;animation:fi .4s ease">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
        <div style="position:relative;width:72px;height:72px;flex-shrink:0">
          <svg viewBox="0 0 72 72" style="transform:rotate(-90deg)"><circle cx="36" cy="36" r="30" fill="none" stroke="var(--bd)" stroke-width="6"/><circle cx="36" cy="36" r="30" fill="none" stroke="${sc}" stroke-width="6" stroke-dasharray="${(conf/100)*188.5} 188.5" stroke-linecap="round" style="filter:drop-shadow(0 0 6px ${sc}60)"/></svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:${sc}">${conf}%</div>
        </div>
        <div>
          <div style="font-family:'Outfit',sans-serif;font-size:24px;font-weight:900;color:${sc};letter-spacing:2px;line-height:1">${o.sentiment}</div>
          <div style="font-size:9px;color:#6b7280;margin-top:3px">Live Outlook • Auto-updated</div>
        </div>
      </div>
      <div style="font-size:11px;color:#c9d1d9;line-height:1.7;margin-bottom:10px">${o.summary||""}</div>
      ${o.drivers?.length ? `<div style="display:flex;gap:4px;flex-wrap:wrap">${o.drivers.map(d=>`<span style="padding:2px 7px;border-radius:4px;font-size:8px;background:#161b22;color:var(--d);border:1px solid #30363d">${d}</span>`).join("")}</div>` : ""}
    </div>`;
  }

  // ── Stats ──
  if (nw.length) {
    h += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:12px">
      <div style="background:var(--c);border:1px solid var(--bd);border-radius:8px;padding:5px 0;text-align:center"><div style="font-size:17px;font-weight:900;color:var(--r)">${hi}</div><div style="font-size:7px;color:#6b7280;font-weight:700;letter-spacing:1px">HIGH IMPACT</div></div>
      <div style="background:var(--c);border:1px solid var(--bd);border-radius:8px;padding:5px 0;text-align:center"><div style="font-size:17px;font-weight:900;color:var(--g)">${po}</div><div style="font-size:7px;color:#6b7280;font-weight:700;letter-spacing:1px">POSITIVE</div></div>
      <div style="background:var(--c);border:1px solid var(--bd);border-radius:8px;padding:5px 0;text-align:center"><div style="font-size:17px;font-weight:900;color:var(--r)">${ne}</div><div style="font-size:7px;color:#6b7280;font-weight:700;letter-spacing:1px">NEGATIVE</div></div>
    </div>`;
  }

  // ── Tabs ──
  h += `<div style="display:flex;border-bottom:1px solid var(--bd);margin-bottom:12px">
    <button onclick="tab='news';render()" style="padding:8px 16px;font-size:11px;font-weight:600;color:${tab==="news"?"var(--t)":"var(--m)"};border-bottom:2px solid ${tab==="news"?"var(--b)":"transparent"};font-family:inherit">📰 News<span style="font-size:9px;background:var(--bd);border-radius:8px;padding:0 5px;margin-left:3px">${nw.length}</span></button>
    <button onclick="tab='breakouts';render()" style="padding:8px 16px;font-size:11px;font-weight:600;color:${tab==="breakouts"?"var(--t)":"var(--m)"};border-bottom:2px solid ${tab==="breakouts"?"var(--b)":"transparent"};font-family:inherit">📈 Breakouts<span style="font-size:9px;background:var(--bd);border-radius:8px;padding:0 5px;margin-left:3px">${bk.length}</span></button>
  </div>`;

  // ── News Tab ──
  if (tab === "news") {
    if (!nw.length) {
      h += `<div style="text-align:center;padding:30px;color:var(--m);font-size:11px">Scanning news feeds... first results in ~30s</div>`;
    }
    nw.forEach((n,i) => {
      const dc = dC[n.direction]||"var(--y)";
      const da = dA[n.direction]||"●";
      const ic = iC[n.impact]||"var(--m)";
      const bc = n.direction==="POSITIVE"?"#238636":n.direction==="NEGATIVE"?"#da3633":"#9e6a03";
      h += `<div style="background:var(--c);border:1px solid var(--bd);border-radius:10px;padding:11px;margin-bottom:7px;border-left:3px solid ${bc};animation:fi .2s ease ${i*.02}s both">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;margin-bottom:2px"><span style="color:${dc};font-weight:900;font-size:13px;margin-right:4px">${da}</span><span style="font-size:11.5px;font-weight:700;line-height:1.35">${n.headline}</span></div>
            <div style="font-size:9px;color:#6b7280;margin:3px 0 4px">${n.source} • ${n.time||""}</div>
            ${n.analysis?`<div style="font-size:10px;color:var(--d);line-height:1.5">${n.analysis}</div>`:""}
            ${n.sectors?.length?`<div style="display:flex;gap:3px;margin-top:4px;flex-wrap:wrap">${n.sectors.map(s=>`<span style="padding:1px 5px;border-radius:3px;font-size:8px;background:#161b22;color:var(--d)">${s}</span>`).join("")}</div>`:""}
          </div>
          <span style="padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;white-space:nowrap;background:${ic}15;border:1px solid ${ic}40;color:${ic}">${n.impact}</span>
        </div>
        ${n.is_major?'<div style="margin-top:6px;padding:3px 7px;border-radius:4px;background:#8957e512;border:1px solid #8957e530;font-size:9px;color:var(--p);font-weight:600">🚨 MAJOR</div>':""}
      </div>`;
    });
  }

  // ── Breakouts Tab ──
  if (tab === "breakouts") {
    h += `<div style="font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;margin-bottom:4px">📈 Live Breakout Scanner</div>
    <div style="font-size:9px;color:var(--m);margin-bottom:12px;line-height:1.5">Auto-detected from 70+ NSE stocks using SMA, RSI, volume, Bollinger, 52W high patterns. Buy/Sell ranges from ATR — not hardcoded.</div>`;

    if (!bk.length) {
      h += `<div style="text-align:center;padding:30px;color:var(--m);font-size:11px">Scanning stocks... first results in ~2 min</div>`;
    }
    bk.forEach((b,i) => {
      const cc = b.confidence >= 70 ? "var(--g)" : "var(--y)";
      h += `<div style="background:var(--c);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:12px;animation:fi .3s ease ${i*.05}s both">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div><span style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:900">${b.symbol}</span><span style="font-size:10px;color:#6b7280;margin-left:8px">${b.name||""}</span></div>
          <span style="padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;background:var(--g)15;border:1px solid var(--g)40;color:var(--g)">${b.side}</span>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">
          <span style="padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;background:var(--b)15;border:1px solid var(--b)40;color:var(--b)">${b.pattern}</span>
          <span style="padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;background:var(--p)15;border:1px solid var(--p)40;color:var(--p)">R:R ${b.risk_reward}</span>
        </div>

        <div style="background:#0c1929;border:1px solid #1f3d5f;border-radius:8px;padding:10px;margin-bottom:6px">
          <div style="font-size:9px;font-weight:800;color:var(--b);letter-spacing:2px;margin-bottom:6px">📥 BUY RANGE</div>
          <div style="display:flex;justify-content:space-around;align-items:center">
            <div style="text-align:center"><div style="font-size:8px;color:#388bfd;font-weight:600">LOW</div><div style="font-size:16px;font-weight:900;color:#79c0ff">${INR(b.buy_low)}</div></div>
            <span style="color:#30363d;font-size:16px">⟶</span>
            <div style="text-align:center"><div style="font-size:8px;color:#388bfd;font-weight:600">HIGH</div><div style="font-size:16px;font-weight:900;color:#79c0ff">${INR(b.buy_high)}</div></div>
          </div>
        </div>

        <div style="background:#071a14;border:1px solid #1b4332;border-radius:8px;padding:10px;margin-bottom:6px">
          <div style="font-size:9px;font-weight:800;color:var(--g);letter-spacing:2px;margin-bottom:6px">📤 SELL / TARGET</div>
          <div style="display:flex;justify-content:space-around;align-items:center">
            <div style="text-align:center"><div style="font-size:8px;color:#2ea043;font-weight:600">TGT 1</div><div style="font-size:16px;font-weight:900;color:#7ee787">${INR(b.target_1)}</div></div>
            <span style="color:#30363d;font-size:16px">⟶</span>
            <div style="text-align:center"><div style="font-size:8px;color:#2ea043;font-weight:600">TGT 2</div><div style="font-size:16px;font-weight:900;color:#7ee787">${INR(b.target_2)}</div></div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
          <div style="background:#1c0a0a;border:1px solid #5c1616;border-radius:8px;padding:7px 6px;text-align:center">
            <div style="font-size:8px;color:var(--r);font-weight:700;letter-spacing:1.5px;margin-bottom:2px">⛔ STOP LOSS</div>
            <div style="font-size:15px;font-weight:900;color:#ff7b72">${INR(b.stop_loss)}</div>
          </div>
          <div style="background:#150e24;border:1px solid #3b2466;border-radius:8px;padding:7px 6px;text-align:center">
            <div style="font-size:8px;color:var(--p);font-weight:700;letter-spacing:1.5px;margin-bottom:2px">⏱ HOLD</div>
            <div style="font-size:12px;font-weight:900;color:#d2a8ff">${b.duration}</div>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div style="font-size:10px;color:var(--d);flex:1;line-height:1.45">${b.reason}</div>
          <div style="text-align:center;min-width:40px"><div style="font-size:7px;color:#6b7280;letter-spacing:1px">CONF</div><div style="font-size:16px;font-weight:900;color:${cc}">${b.confidence}%</div></div>
        </div>
      </div>`;
    });

    h += `<div style="background:#1c1e3d15;border:1px solid #8957e520;border-radius:8px;padding:10px;font-size:9px;color:var(--d);line-height:1.6;margin-top:4px">⚠️ Auto-detected patterns. Not financial advice. All levels calculated from ATR. Verify before trading. DYOR.</div>`;
  }

  h += `<div style="text-align:center;padding:16px 0 10px;font-size:8px;color:#30363d;line-height:1.8">
    Market Pulse • Live scanner • ${st.watchlist_size||0} stocks monitored<br>
    Share this URL with friends — they see the same live data
  </div></div>`;

  document.getElementById("app").innerHTML = h;
}

// ── Auto-refresh every 60s ──
load();
setInterval(load, 60000);

// ── Register Service Worker ──
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(()=>{});
}
</script>
</body>
</html>
